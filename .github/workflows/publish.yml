name: Publish to npm

# Publishes the package to the npm registry whenever a version tag is
# pushed. Canonical release flow:
#
#   npm version patch    # or minor / major — edits package.json,
#                        # creates a commit, tags it v<new-version>
#   git push --follow-tags
#
# Authenticates to npm via **Trusted Publisher** (OIDC) — no
# NPM_TOKEN secret. The npm package must have GitHub Actions
# configured as a Trusted Publisher pointing at this repo + this
# workflow filename. See DEVELOPERS.md for setup.
#
# The action below picks up the tag, verifies it matches
# package.json's version, runs the full typecheck + test + build, and
# publishes with npm provenance.

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: read
  id-token: write # required for `npm publish --provenance`

concurrency:
  group: npm-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish @valu/block-components
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          # Intentionally NO `registry-url:` — that option writes an
          # `.npmrc` with `//registry.npmjs.org/:_authToken=…` which
          # npm's Trusted Publisher docs explicitly call out as
          # incompatible (an `_authToken` line blocks OIDC fallback).
          # registry.npmjs.org is the default anyway, so we don't
          # need to set it.

      - name: Pin npm to latest 11.x via Corepack
        # Trusted Publisher (OIDC-based registry auth) requires
        # npm ≥ 11.5.1. Node 24 ships npm 11.2 which is too old,
        # so we use Corepack to activate the latest 11.x in place.
        run: |
          echo "Before:"
          which npm
          npm --version
          corepack prepare npm@latest --activate
          echo "After:"
          which npm
          npm --version

      - name: Dump auth / OIDC state for debugging
        # If Trusted Publisher ever 404s or ENEEDAUTHs again, these
        # outputs pinpoint the cause: missing OIDC env, stray .npmrc
        # authToken, or CLI version still on 10.x.
        run: |
          echo "=== OIDC env presence ==="
          echo "ACTIONS_ID_TOKEN_REQUEST_URL   = ${ACTIONS_ID_TOKEN_REQUEST_URL:+SET}${ACTIONS_ID_TOKEN_REQUEST_URL:-UNSET}"
          echo "ACTIONS_ID_TOKEN_REQUEST_TOKEN = ${ACTIONS_ID_TOKEN_REQUEST_TOKEN:+SET}${ACTIONS_ID_TOKEN_REQUEST_TOKEN:-UNSET}"
          echo
          echo "=== .npmrc state (Trusted Publisher requires NO _authToken) ==="
          echo "--- project ./.npmrc ---"
          cat .npmrc 2>/dev/null || echo "(absent)"
          echo "--- home ~/.npmrc ---"
          cat ~/.npmrc 2>/dev/null || echo "(absent)"
          echo
          echo "=== effective npm config (filtered) ==="
          npm config list 2>&1 | grep -Ei 'registry|authToken|provenance|auth-type' || true

      - name: Install deps
        run: npm ci

      - name: Verify tag matches package.json version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          echo "tag:         $TAG_VERSION"
          echo "package.json: $PKG_VERSION"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match package.json ($PKG_VERSION). Refusing to publish."
            exit 1
          fi

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Publish
        # Uses npm Trusted Publisher (OIDC) — no NPM_TOKEN needed.
        # GitHub mints a short-lived token from the id-token: write
        # permission above; npm CLI detects and exchanges it automatically.
        #
        # --ignore-scripts skips the already-run prepublishOnly hook so
        # we don't re-run typecheck/test/build. --provenance attests the
        # build chain on npm for supply-chain transparency.
        run: npm publish --access public --provenance --ignore-scripts
